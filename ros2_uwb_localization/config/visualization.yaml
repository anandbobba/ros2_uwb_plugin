# =============================================================================
# UWB Visualization Node Configuration
# =============================================================================

/**:
  ros__parameters:
    # Anchor marker appearance
    anchor_marker_scale: 0.3       # Marker cube side length (meters)
    anchor_marker_alpha: 0.9       # Marker transparency [0.0 - 1.0]
    anchor_label_offset: 0.5       # Text label height above anchor (meters)

    # Range circle visualization
    show_range_circles: true
    range_circle_alpha: 0.15       # Circle transparency
    range_circle_segments: 64      # Circle resolution

    # Update rate
    publish_rate: 5.0              # Marker publish rate (Hz)
