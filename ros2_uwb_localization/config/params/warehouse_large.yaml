# Environment Profile: Warehouse Large (high multipath, long range)
# Target: Large logistics centers, industrial halls (> 50m range)
uwb_range_preprocessor:
  ros__parameters:
    min_rssi: -95.0
    range_timeout: 1.0
    publish_rate: 10.0

uwb_trilateration_solver:
  ros__parameters:
    range_std_dev: 0.2
    outlier_threshold: 3.0
    optimization_iterations: 20

ekf_filter_node:
  ros__parameters:
    process_noise_covariance: [0.1, ..., 0.1] # (Higher noise for aggressive dynamics)
